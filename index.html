<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Azimut — Ton assistant personnel pour le sport, la rando, le voyage et le pro." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/public/icons/icon-192.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Leaflet CSS (will be used later in Parcours) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Design System -->
    <link rel="stylesheet" href="./src/index.css" />
    
    <title>Azimut</title>
    <script>
      window.addEventListener('error', function(e) {
        const errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '10px';
        errDiv.style.left = '10px';
        errDiv.style.right = '10px';
        errDiv.style.padding = '20px';
        errDiv.style.background = 'rgba(255, 0, 0, 0.9)';
        errDiv.style.color = 'white';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.zIndex = '999999';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.innerHTML = '<h2>Runtime Error:</h2>' + e.message + '<br>at ' + e.filename + ':' + e.lineno + ':' + e.colno + '<br><br>Stack:<br>' + (e.error ? e.error.stack : 'N/A');
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '10px';
        errDiv.style.left = '10px';
        errDiv.style.right = '10px';
        errDiv.style.padding = '20px';
        errDiv.style.background = 'rgba(255, 100, 0, 0.9)';
        errDiv.style.color = 'white';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.zIndex = '999999';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.innerHTML = '<h2>Unhandled Promise Rejection:</h2>' + e.reason + '<br><br>Stack:<br>' + (e.reason && e.reason.stack ? e.reason.stack : 'N/A');
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <!-- App Container -->
    <div id="app"></div>

    <!-- Lucide Icons (Vanilla JS version) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Main Application -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
